name: E2E (booking journey, Wave 1)

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'tests/**'
      - 'scripts/seed-e2e-users.mjs'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  booking-wave-1:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.E2E_SUPABASE_SECRET_KEY }}
      # Refuse to seed against prod even if SUPABASE_URL is misconfigured.
      ALLOW_PROD_SEED: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed E2E test data
        run: npm run seed:e2e

      - name: Build Next.js app
        run: npm run build

      - name: Run Wave 1 booking specs
        run: npm run test:e2e:booking

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
